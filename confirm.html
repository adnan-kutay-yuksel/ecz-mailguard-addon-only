<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MailGuard Uyarı</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root {
      --ink:        #1a1d29;
      --ink-soft:    #5a5f73;
      --paper:       #fdfcfa;
      --amber:       #c4720a;
      --amber-soft:  #fdf3e2;
      --rust:        #b5371f;
      --rust-hover:  #9c2e19;
      --line:        #e8e5de;
      --ghost:       #f1efe9;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
    }

    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      padding: 22px 24px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .kimlik {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .kimlik .nokta {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
      flex: none;
    }

    .kimlik span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .uyari {
      position: relative;
      background: var(--amber-soft);
      border-radius: 6px;
      padding: 14px 16px 14px 18px;
      margin-bottom: 18px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #6b3f02;
    }

    .uyari::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 6px 0 0 6px;
      background: var(--amber);
    }

    .soru {
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
      margin: 0 0 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .butonlar {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px 18px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      transition: background-color 120ms ease, transform 80ms ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .gonder {
      background: var(--rust);
      color: #fff;
    }
    .gonder:hover { background: var(--rust-hover); }

    .iptal {
      background: var(--ghost);
      color: var(--ink);
    }
    .iptal:hover { background: var(--line); }

    button:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="kimlik">
    <span class="nokta"></span>
    <span>MailGuard</span>
  </div>

  <div class="uyari" id="mesajDiv">Analiz yapılıyor...</div>

  <p class="soru" id="soruDiv">Yine de göndermek istiyor musunuz?</p>

  <div class="butonlar">
    <button class="gonder" onclick="gonder()">Yine de Gönder</button>
    <button class="iptal"  onclick="iptal()">İptal Et</button>
  </div>

  <script>
    Office.onReady(function () {
      var params = new URLSearchParams(window.location.search);
      var mesaj = params.get("mesaj") || "Risk tespit edildi.";
      var soru  = params.get("soru")  || "Yine de göndermek istiyor musunuz?";
      document.getElementById("mesajDiv").textContent = mesaj;
      document.getElementById("soruDiv").textContent  = soru;
    });
    function gonder() {
      Office.context.ui.messageParent("GONDER");
    }
    function iptal() {
      Office.context.ui.messageParent("IPTAL");
    }
  </script>
</body>
</html>
