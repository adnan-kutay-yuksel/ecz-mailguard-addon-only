<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <title>MailGuard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    body { font-family: "Segoe UI", sans-serif; padding: 16px; margin: 0; background: #f3f2f1; }
    h2   { color: #0078d4; font-size: 16px; margin-bottom: 8px; }
    p    { color: #323130; font-size: 13px; line-height: 1.5; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-top: 8px; }
    .active { background: #dff6dd; color: #107c10; }
  </style>
</head>
<body>
  <h2>MailGuard</h2>
  <p>Gönderdiğiniz her e-posta yapay zeka tarafından denetlenmektedir.</p>
  <span class="badge active">Aktif</span>
</body>
</html>
